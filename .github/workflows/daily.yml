name: Daily Oil Price

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 爬取并推送
        run: |
          python - <<'EOF'
          import requests
          from datetime import datetime

          def fetch_price():
              try:
                  # 免费油价API，直接返回JSON
                  res = requests.get("http://api.xcvts.cn/api/youjia", timeout=8)
                  data = res.json()
                  print("API返回：", str(data)[:200])

                  lines = []
                  # API按油号分开返回，找云南的数据
                  for item in data:
                      oil_type = item.get("type", "")
                      price_data = item.get("data", {})
                      yunnan = price_data.get("云南", "")
                      if yunnan and ("92" in oil_type or "95" in oil_type or "98" in oil_type or "0号" in oil_type or "柴油" in oil_type):
                          lines.append(f"💧 {oil_type.replace('价格(元/升)', '').strip()}：{yunnan} 元/升")

                  if not lines:
                      return "未获取到云南油价", ""

                  notice = data[0].get("tiaojia", "") if data else ""
                  return "\n".join(lines), notice[:80] if notice else ""

              except Exception as e:
                  return f"请求失败：{e}", ""

          def push_notify(title, message):
              url = "https://messagepush.luckfast.com/send/avF9zCcVsXs/4453fbdabe83c204f4a5c1e03cb29ee5"
              params = {"title": title, "message": message[:300]}
              try:
                  res = requests.get(url, params=params, timeout=10)
                  print("推送结果：", res.text)
              except Exception as e:
                  print("推送失败：", e)

          today = datetime.now().strftime("%m月%d日")
          price_text, notice = fetch_price()
          print("价格：\n", price_text)

          message = price_text
          if notice:
              message += f"\n\n📢 {notice}"

          push_notify(f"⛽ 楚雄今日油价 {today}", message)
          EOF
