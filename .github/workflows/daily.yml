name: Daily Oil Price

on:
  schedule:
    - cron: "20 3 * * *"   # UTC 03:20 = 北京时间 11:20
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 爬取并推送
        run: python .github/workflows/fetch_price.py
        
