name: Daily Oil Price

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install selenium beautifulsoup4
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: 爬取并推送
        run: |
          python - <<'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from bs4 import BeautifulSoup
          from datetime import datetime
          import requests
          import re
          import time

          def fetch_price():
              options = Options()
              options.add_argument("--headless")
              options.add_argument("--no-sandbox")
              options.add_argument("--disable-dev-shm-usage")
              options.binary_location = "/usr/bin/chromium-browser"

              service = Service("/usr/bin/chromedriver")
              driver = webdriver.Chrome(service=service, options=options)

              try:
                  driver.get("http://www.qiyoujiage.com/yunnan/chuxiong.shtml")
                  time.sleep(3)
                  soup = BeautifulSoup(driver.page_source, "html.parser")
              finally:
                  driver.quit()

              prices = []
              for tag in soup.find_all(["td", "div", "p", "span", "li"]):
                  text = tag.get_text(strip=True)
                  if re.search(r"\d+\.\d{2}", text) and len(text) < 30:
                      prices.append(text)

              seen = set()
              final = []
              for p in prices:
                  if p not in seen:
                      seen.add(p)
                      final.append(p)
              final = final[:4]

              if not final:
                  return "未找到价格", ""

              labels = ["92", "95", "98", "0"]
              lines = []
              for i, price in enumerate(final):
                  label = labels[i] if i < len(labels) else str(i+1)
                  price_clean = re.sub(r'[(（].*?[)）]', '', price).strip()
                  lines.append(f"💧 {label}号汽油：{price_clean} 元/升")

              notice = ""
              for tag in soup.find_all(string=re.compile(r"\d+月\d+日.*调整")):
                  text = tag.strip()
                  if text and len(text) < 100:
                      notice = text
                      break

              return "\n".join(lines), notice

          def push_notify(title, message):
              url = "https://messagepush.luckfast.com/send/avF9zCcVsXs/4453fbdabe83c204f4a5c1e03cb29ee5"
              try:
                  res = requests.get(url, params={"title": title, "message": message[:300]}, timeout=10)
                  print("推送结果：", res.text)
              except Exception as e:
                  print("推送失败：", e)

          today = datetime.now().strftime("%m月%d日")
          price_text, notice = fetch_price()
          print("价格：\n", price_text)

          message = price_text
          if notice:
              message += f"\n\n📢 {notice}"

          push_notify(f"⛽ 楚雄今日油价 {today}", message)
          EOF
