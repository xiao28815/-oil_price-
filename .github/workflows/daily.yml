name: Daily Oil Price

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 爬取并推送
        run: |
          python - <<'EOF'
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime
          import re

          def fetch_price():
              url = "https://www.qiyoujiage.com/yunnan/chuxiong.shtml"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
                  "Accept-Language": "zh-CN,zh;q=0.9",
                  "Referer": "https://www.qiyoujiage.com/yunnan.shtml"
              }
              try:
                  res = requests.get(url, headers=headers, timeout=8)
                  res.encoding = "utf-8"
                  print("status:", res.status_code)
                  print("length:", len(res.text))
                  print("preview:", res.text[:300])
              except Exception as e:
                  return f"failed: {e}", ""

              soup = BeautifulSoup(res.text, "html.parser")

              prices = []
              for tag in soup.find_all(["td", "div", "p", "span", "li"]):
                  text = tag.get_text(strip=True)
                  if re.search(r"\d+\.\d{2}", text) and len(text) < 30:
                      prices.append(text)

              seen = set()
              final = []
              for p in prices:
                  if p not in seen:
                      seen.add(p)
                      final.append(p)
              final = final[:4]

              if not final:
                  return "no price found", ""

              labels = ["92", "95", "98", "0"]
              lines = []
              for i, price in enumerate(final):
                  label = labels[i] if i < len(labels) else str(i+1)
                  price_clean = re.sub(r'[(（].*?[)）]', '', price).strip()
                  lines.append(f"💧 {label}号汽油：{price_clean} 元/升")

              notice = ""
              for tag in soup.find_all(string=re.compile(r"\d+月\d+日.*调整")):
                  text = tag.strip()
                  if text and len(text) < 100:
                      notice = text
                      break

              return "\n".join(lines), notice

          def push_notify(title, message):
              url = "https://messagepush.luckfast.com/send/avF9zCcVsXs/4453fbdabe83c204f4a5c1e03cb29ee5"
              params = {"title": title, "message": message[:300]}
              try:
                  res = requests.get(url, params=params, timeout=10)
                  print("push result:", res.text)
              except Exception as e:
                  print("push failed:", e)

          today = datetime.now().strftime("%m月%d日")
          price_text, notice = fetch_price()
          print("prices:\n", price_text)

          message = price_text
          if notice:
              message += f"\n\n📢 {notice}"

          push_notify(f"⛽ 楚雄今日油价 {today}", message)
          EOF
